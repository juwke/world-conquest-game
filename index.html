<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #0f0f0f; color: #00ff00; font-family: monospace; text-align: center; margin: 0; padding: 20px; }
        #map-container { width: 100%; height: 300px; background: #1a1a1a; border: 2px solid #00ff00; margin-top: 20px; position: relative; }
        .region { fill: #333; stroke: #00ff00; stroke-width: 1; transition: 0.2s; }
        .captured { fill: #00ff00 !important; }
        .version-tag { font-size: 10px; color: #555; margin-top: 10px; }
    </style>
</head>
<body>
    <h2 style="color: #00ff00;">STRATEGY v2.0</h2>
    <p>Захвачено: <span id="score">0</span> / 10</p>

    <div id="map-container">
        <svg viewBox="0 0 300 150">
            <rect id="r1" class="region" x="10" y="10" width="40" height="40" onclick="claim(this)" />
            <rect id="r2" class="region" x="60" y="10" width="40" height="40" onclick="claim(this)" />
            <rect id="r3" class="region" x="110" y="10" width="40" height="40" onclick="claim(this)" />
            <rect id="r4" class="region" x="10" y="60" width="40" height="40" onclick="claim(this)" />
            <rect id="r5" class="region" x="60" y="60" width="40" height="40" onclick="claim(this)" />
            <rect id="r6" class="region" x="110" y="60" width="40" height="40" onclick="claim(this)" />
            <rect id="r7" class="region" x="160" y="10" width="40" height="90" onclick="claim(this)" />
            <rect id="r8" class="region" x="210" y="10" width="80" height="40" onclick="claim(this)" />
            <rect id="r9" class="region" x="210" y="60" width="35" height="40" onclick="claim(this)" />
            <rect id="r10" class="region" x="255" y="60" width="35" height="40" onclick="claim(this)" />
        </svg>
    </div>
    <div class="version-tag">Build: 2026-04-23_A</div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        let score = 0;
        function claim(el) {
            if (!el.classList.contains('captured')) {
                el.classList.add('captured');
                score++;
                document.getElementById('score').innerText = score;
                tg.HapticFeedback.impactOccurred('medium');
            }
        }
    </script>
</body>
</html>
