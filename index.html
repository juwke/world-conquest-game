<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { 
            background: #111; 
            color: #eee; 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            margin: 0; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            height: 100vh;
        }
        .header { margin: 15px; text-align: center; }
        .header h2 { margin: 0; color: #00d1ff; text-transform: uppercase; }
        .stat-bar { margin-top: 5px; opacity: 0.8; }
        
        #map-container { 
            width: 100vw; 
            flex-grow: 1; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            background: #1a1a1a; 
            border-top: 1px solid #333; 
        }
        
        svg { 
            width: 95%; 
            height: 95%; 
            /* Смещение для лучшего отображения на телефоне */
            transform: translate(0, 10px); 
        }
        
        .land { 
            fill: #3a3a3a; 
            stroke: #111; 
            stroke-width: 0.5; 
            transition: all 0.2s; 
            cursor: pointer;
        }
        
        .land:hover { fill: #555; stroke: #fff; stroke-width: 1; }
        
        .captured { 
            fill: #00d1ff !important; 
            stroke: #fff; 
            stroke-width: 1;
        }
    </style>
</head>
<body>
    <div class="header">
        <h2>Доминация Мира</h2>
        <div class="stat-bar">Захвачено: <span id="score">0</span> / 15 территорий</div>
    </div>

    <div id="map-container">
        <svg viewBox="0 0 1000 600" preserveAspectRatio="xMidYMid meet">
            <path id="reg1" class="land" d="M120,40 L300,45 L280,100 L110,95 Z" onclick="claim(this)"/>
            <path id="reg2" class="land" d="M120,100 L320,105 L310,180 L130,175 Z" onclick="claim(this)"/>
            <path id="reg3" class="land" d="M160,180 L280,185 L260,250 L200,240 Z" onclick="claim(this)"/>
            <path id="reg4" class="land" d="M250,260 L350,265 L330,350 L260,340 Z" onclick="claim(this)"/>
            <path id="reg5" class="land" d="M260,350 L340,360 L300,550 L260,530 Z" onclick="claim(this)"/>
            <path id="reg6" class="land" d="M430,100 L530,100 L530,190 L430,190 Z" onclick="claim(this)"/>
            <path id="reg7" class="land" d="M530,90 L630,90 L630,180 L530,180 Z" onclick="claim(this)"/>
            <path id="reg8" class="land" d="M430,200 L560,205 L540,300 L440,300 Z" onclick="claim(this)"/>
            <path id="reg9" class="land" d="M470,305 L550,310 L530,500 L470,480 Z" onclick="claim(this)"/>
            <path id="reg10" class="land" d="M600,50 L850,55 L830,150 L610,145 Z" onclick="claim(this)"/>
            <path id="reg11" class="land" d="M600,150 L750,155 L740,250 L610,245 Z" onclick="claim(this)"/>
            <path id="reg12" class="land" d="M800,100 L950,110 L930,220 L800,210 Z" onclick="claim(this)"/>
            <path id="reg13" class="land" d="M570,185 L650,190 L640,260 L570,260 Z" onclick="claim(this)"/>
            <path id="reg14" class="land" d="M750,250 L900,260 L880,400 L750,380 Z" onclick="claim(this)"/>
            <path id="reg15" class="land" d="M800,410 L940,420 L920,550 L800,530 Z" onclick="claim(this)"/>
        </svg>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        let score = 0;
        
        function claim(el) {
            if (!el.classList.contains('captured')) {
                el.classList.add('captured');
                score++;
                document.getElementById('score').innerText = score;
                tg.HapticFeedback.impactOccurred('light');
            }
        }
    </script>
</body>
</html>
