<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background-color: #121212; color: white; font-family: sans-serif; margin: 0; overflow: hidden; display: flex; flex-direction: column; align-items: center; }
        .header { margin: 20px; text-align: center; }
        #map-container { width: 95vw; height: 60vh; background: #1e1e1e; border-radius: 15px; border: 2px solid #333; position: relative; }
        svg { width: 100%; height: 100%; }
        .country { fill: #3a3a3a; stroke: #121212; stroke-width: 1; transition: fill 0.3s; }
        .captured { fill: #00d1ff; stroke: #fff; }
        .btn-attack { margin-top: 20px; padding: 15px 30px; background: #0088cc; border: none; border-radius: 10px; color: white; font-weight: bold; font-size: 16px; }
    </style>
</head>
<body>
    <div class="header">
        <h2 id="user-name">Завоеватель</h2>
        <p>Территорий под контролем: <span id="score">0</span></p>
    </div>

    <div id="map-container">
        <svg viewBox="0 0 200 120">
            <path id="reg1" class="country" d="M10,10 L50,10 L45,40 L15,35 Z" onclick="claim(this)" />
            <path id="reg2" class="country" d="M55,15 L90,12 L95,45 L50,42 Z" onclick="claim(this)" />
            <path id="reg3" class="country" d="M20,45 L45,45 L40,80 L10,75 Z" onclick="claim(this)" />
            <path id="reg4" class="country" d="M100,20 L140,25 L135,60 L95,55 Z" onclick="claim(this)" />
        </svg>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        let score = 0;
        if (tg.initDataUnsafe.user) {
            document.getElementById('user-name').innerText = tg.initDataUnsafe.user.first_name;
        }

        function claim(el) {
            if (!el.classList.contains('captured')) {
                el.classList.add('captured');
                score++;
                document.getElementById('score').innerText = score;
                tg.HapticFeedback.notificationOccurred('success');
            }
        }
    </script>
</body>
</html>
