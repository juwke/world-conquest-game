<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #050505; color: #00d1ff; font-family: 'Courier New', monospace; margin: 0; overflow: hidden; text-align: center; }
        canvas { background: #0a0a0a; display: block; margin: 0 auto; touch-action: none; }
        .ui-panel { position: fixed; top: 10px; width: 100%; pointer-events: none; }
        .stats { background: rgba(0, 0, 0, 0.8); padding: 10px; border: 1px solid #00d1ff; display: inline-block; pointer-events: auto; border-radius: 5px; }
        .controls { position: fixed; bottom: 20px; width: 100%; }
    </style>
</head>
<body>
    <div class="ui-panel">
        <div class="stats">
            ЗОН ЗАХВАЧЕНО: <span id="score">0</span> / 1000
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const ROWS = 40; 
        const COLS = 25; // Итого 1000 плиток
        const cells = [];
        let score = 0;

        // Инициализация сетки
        const cellW = canvas.width / COLS;
        const cellH = canvas.height / ROWS;

        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                cells.push({
                    x: c * cellW,
                    y: r * cellH,
                    captured: false,
                    color: '#1a1a1a'
                });
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            cells.forEach(cell => {
                ctx.fillStyle = cell.captured ? '#00d1ff' : '#1a1a1a';
                ctx.strokeStyle = '#333';
                ctx.fillRect(cell.x, cell.y, cellW, cellH);
                ctx.strokeRect(cell.x, cell.y, cellW, cellH);
            });
        }

        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;

            cells.forEach(cell => {
                if (mouseX >= cell.x && mouseX <= cell.x + cellW &&
                    mouseY >= cell.y && mouseY <= cell.y + cellH && !cell.captured) {
                    cell.captured = true;
                    score++;
                    scoreEl.innerText = score;
                    tg.HapticFeedback.impactOccurred('light');
                    draw();
                }
            });
        });

        draw();
    </script>
</body>
</html>
